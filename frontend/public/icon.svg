<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#1e1e1e" />
  
  <!-- Subtle Connecting Lines (MinIO Object Storage) -->
  <line x1="100" y1="100" x2="40" y2="40" stroke="#ffffff" stroke-width="1.5" />
  <line x1="100" y1="100" x2="160" y2="40" stroke="#ffffff" stroke-width="1.5" />
  <line x1="100" y1="100" x2="40" y2="160" stroke="#ffffff" stroke-width="1.5" />
  <line x1="100" y1="100" x2="160" y2="160" stroke="#ffffff" stroke-width="1.5" />
  
  <!-- Messaging Clusters -->
  <circle cx="40" cy="40" r="6" fill="#ffffff" />
  <circle cx="160" cy="40" r="6" fill="#ffffff" />
  <circle cx="40" cy="160" r="6" fill="#ffffff" />
  <circle cx="160" cy="160" r="6" fill="#ffffff" />
  
  <!-- Object Storage Cluster -->
  <rect x="85" y="85" width="30" height="30" fill="#ffffff" />
  <rect x="100" y="100" width="30" height="30" fill="#1e1e1e" />
  <rect x="115" y="115" width="30" height="30" fill="#ffffff" />
</svg>
